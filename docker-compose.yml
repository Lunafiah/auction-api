version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: auction-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auction_db
      POSTGRES_USER: auction_user
      POSTGRES_PASSWORD: auction_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
