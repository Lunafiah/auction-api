spring.application.name=auction-api

# PostgreSQL Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/auction_db
spring.datasource.username=auction_user
spring.datasource.password=auction_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Spring Security is enabled for Step 2.
