spring.application.name=auction-api

# --- Server Configuration ---
server.port=${PORT:8080}

# --- Production Ready Database Connection ---
# The ${ENV_VAR:default_value} syntax allows Render/Railway to inject secrets 
# while keeping local Docker completely functional!
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auction_db}
spring.datasource.username=${DB_USERNAME:auction_user}
spring.datasource.password=${DB_PASSWORD:auction_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
